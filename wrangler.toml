name = "pillowfort"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[assets]
directory = "./client/dist"
binding = "ASSETS"
run_worker_first = true

[durable_objects]
bindings = [
  { name = "ROOM", class_name = "Room" }
]

[[migrations]]
tag = "v1"
new_classes = ["Room"]

[observability]
enabled = true

[observability.logs]
invocation_logs = true
